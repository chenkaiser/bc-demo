name: OWASP dependency check

on:
  schedule:
    - cron: '0 6 * * 1'  # every Monday at 06:00 UTC
  workflow_dispatch:       # allow manual trigger

jobs:
  owasp:
    name: Full CVE scan
    runs-on: ubuntu-latest
    permissions:
      contents: read
      issues: write

    steps:
      - uses: actions/checkout@v6

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          java-version: 21
          distribution: temurin
          cache: maven
        env:
          FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

      # Cache the NVD database so subsequent weekly runs skip the slow download
      - name: Cache NVD database
        uses: actions/cache@v4
        with:
          path: ~/.owasp
          key: owasp-nvd-${{ github.run_id }}
          restore-keys: owasp-nvd-

      - name: OWASP dependency check
        run: |
          mvn dependency-check:check --batch-mode \
            -Dformat=HTML \
            -DdataDirectory=$HOME/.owasp \
            -DfailBuildOnCVSS=7 \
            -DsuppressionFile=.owasp-suppressions.xml \
            -Dassembly.skipAssembly=true

      - name: Upload report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: owasp-report
          path: '**/target/dependency-check-report.html'
          retention-days: 30

      - name: Open issue on failure
        if: failure()
        uses: actions/github-script@v7
        with:
          script: |
            const title = `OWASP: vulnerable dependencies found (${new Date().toISOString().slice(0,10)})`;
            const existing = await github.rest.issues.listForRepo({
              owner: context.repo.owner, repo: context.repo.repo,
              state: 'open', labels: 'security'
            });
            if (!existing.data.some(i => i.title === title)) {
              await github.rest.issues.create({
                owner: context.repo.owner, repo: context.repo.repo,
                title, labels: ['security'],
                body: `The weekly OWASP dependency check found CVE(s) with CVSS ≥ 7.\n\nSee the [workflow run](${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}) for the full report.`
              });
            }
