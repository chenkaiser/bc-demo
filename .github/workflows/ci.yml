name: CI

on:
  pull_request:
    branches: [master]

jobs:
  build:
    name: Build & test all modules
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0  # full history needed for SonarCloud blame info

      - name: Set up Java
        uses: actions/setup-java@v5
        with:
          java-version: 21
          distribution: temurin
          cache: maven

      # Runs: compile → test (with JaCoCo agent) → SpotBugs check → JaCoCo report
      - name: Build, test and analyse
        run: mvn verify --batch-mode -q

      - name: Upload coverage reports
        uses: actions/upload-artifact@v7
        if: always()
        with:
          name: coverage-reports
          path: '**/target/site/jacoco/'
          retention-days: 7

      # Requires SONAR_TOKEN secret — see docs/quality-gates.md for setup.
      - name: SonarCloud analysis
        if: ${{ secrets.SONAR_TOKEN != '' }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        run: mvn sonar:sonar --batch-mode -q
