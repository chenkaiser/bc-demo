name: CI

on:
  pull_request:
    branches: [master]

jobs:
  build:
    name: Build & test all modules
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          java-version: 21
          distribution: temurin
          cache: maven

      - name: Build and test
        run: mvn verify --batch-mode -q
