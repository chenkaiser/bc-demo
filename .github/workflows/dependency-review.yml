name: Dependency review

on:
  pull_request:
    branches: [master]

jobs:
  review:
    name: Block vulnerable dependencies
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write

    steps:
      - uses: actions/checkout@v4

      - name: Dependency review
        uses: actions/dependency-review-action@v4
        with:
          # Fail if any new dependency has a known CVE with CVSS >= 7 (High/Critical)
          fail-on-severity: high
          # Post a summary comment on the PR listing what was found
          comment-summary-in-pr: always
