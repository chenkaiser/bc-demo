# Base configuration shared across all environments.
# Do not use this file directly — always combine with an environment overlay:
#
#   prod:  podman compose -f compose.yml -f compose.prod.yml up --build
#   dev:   podman compose -f compose.yml -f compose.dev.yml up --build
#   infra: podman compose -f compose.yml -f compose.infra.yml up --build
#          then locally: mvn spring-boot:run -pl api-gateway -Dspring-boot.run.profiles=local

services:

  # ── Identity ────────────────────────────────────────────────────────────────

  keycloak:
    image: quay.io/keycloak/keycloak:26.1
    command: start-dev --import-realm
    environment:
      - KEYCLOAK_ADMIN=admin
      - KEYCLOAK_ADMIN_PASSWORD=admin
      - KC_HEALTH_ENABLED=true
      - KC_HTTP_PORT=8080
    volumes:
      - ./keycloak/realm-import.json:/opt/keycloak/data/import/realm-import.json:ro
    ports:
      - "8080:8080"
    networks:
      - app-net
    healthcheck:
      test: ["CMD-SHELL", "exec 3<>/dev/tcp/localhost/9000 && printf 'GET /health/ready HTTP/1.0\\r\\nHost: localhost\\r\\n\\r\\n' >&3 && grep -qm1 UP <&3"]
      interval: 15s
      timeout: 5s
      retries: 15
      start_period: 60s

  # ── Service registry ────────────────────────────────────────────────────────

  eureka-server:
    build:
      context: ./eureka-server
      dockerfile: Dockerfile
      args:
        APP_VERSION: ${APP_VERSION:-local}
    ports:
      - "8761:8761"
    networks:
      - app-net
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8761/eureka/apps"]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 40s

  # ── Backend services ────────────────────────────────────────────────────────

  greet-service:
    build:
      context: ./greet-service
      dockerfile: Dockerfile
      args:
        APP_VERSION: ${APP_VERSION:-local}
    environment:
      - SPRING_APPLICATION_NAME=greet-service
      - SERVER_PORT=8081
      - EUREKA_CLIENT_SERVICEURL_DEFAULTZONE=http://eureka-server:8761/eureka/
      - EUREKA_INSTANCE_PREFER_IP_ADDRESS=true
    networks:
      - app-net
    depends_on:
      eureka-server:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8081/actuator/health"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 40s

  hello-service:
    build:
      context: ./hello-service
      dockerfile: Dockerfile
      args:
        APP_VERSION: ${APP_VERSION:-local}
    environment:
      - SPRING_APPLICATION_NAME=hello-service
      - SERVER_PORT=8080
      - EUREKA_CLIENT_SERVICEURL_DEFAULTZONE=http://eureka-server:8761/eureka/
      - EUREKA_INSTANCE_PREFER_IP_ADDRESS=true
    networks:
      - app-net
    depends_on:
      eureka-server:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/actuator/health"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 40s

  # ── Rate limiter state store ────────────────────────────────────────────────

  redis:
    image: docker.io/library/redis:7-alpine
    command: redis-server --appendonly yes
    ports:
      - "6379:6379"
    networks:
      - app-net
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5

networks:
  app-net:
    driver: bridge
