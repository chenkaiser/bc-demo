# Infrastructure-only overlay: no api-gateway. Backend services register on
# 127.0.0.1 so a locally-running gateway can reach them via Eureka discovery.
#
# Usage: podman compose -f compose.yml -f compose.infra.yml up --build
# Then:  mvn spring-boot:run -pl api-gateway -Dspring-boot.run.profiles=local

services:

  keycloak:
    healthcheck:
      interval: 10s
      start_period: 60s

  eureka-server:
    healthcheck:
      interval: 10s
      start_period: 30s

  greet-service:
    environment:
      - EUREKA_INSTANCE_IP_ADDRESS=127.0.0.1
      - EUREKA_INSTANCE_NON_SECURE_PORT=8081
    ports:
      - "8081:8081"
    healthcheck:
      interval: 10s
      start_period: 30s

  hello-service:
    # Port changed to 8082 to avoid collision with Keycloak on 8080
    environment:
      - SERVER_PORT=8082
      - EUREKA_INSTANCE_IP_ADDRESS=127.0.0.1
      - EUREKA_INSTANCE_NON_SECURE_PORT=8082
    ports:
      - "8082:8082"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8082/actuator/health"]
      interval: 10s
      start_period: 30s

  redis:
    healthcheck:
      interval: 10s
