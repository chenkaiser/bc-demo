# Development overlay: single replica, HTTP gateway on :8888, faster health
#                      checks, ephemeral volumes, no observability stack.
# Usage: podman compose -f compose.yml -f compose.dev.yml up --build

services:

  keycloak:
    healthcheck:
      interval: 10s
      start_period: 60s

  eureka-server:
    healthcheck:
      interval: 10s
      start_period: 30s

  greet-service:
    healthcheck:
      interval: 10s
      start_period: 30s

  hello-service:
    healthcheck:
      interval: 10s
      start_period: 30s

  redis:
    healthcheck:
      interval: 10s

  # ── API Gateway (HTTP, no TLS, no certs needed) ─────────────────────────────

  api-gateway:
    build:
      context: ./api-gateway
      dockerfile: Dockerfile
      args:
        APP_VERSION: ${APP_VERSION:-local}
    ports:
      - "8888:8888"
    environment:
      - EUREKA_CLIENT_SERVICEURL_DEFAULTZONE=http://eureka-server:8761/eureka/
      - EUREKA_INSTANCE_PREFER_IP_ADDRESS=true
      - KEYCLOAK_ISSUER_URI=http://keycloak:8080/realms/bc-demo
      - REDIS_HOST=redis
      - SERVER_PORT=8888
      - SERVER_SSL_ENABLED=false
      - MANAGEMENT_TRACING_SAMPLING_PROBABILITY=0.0
    networks:
      - app-net
    depends_on:
      redis:
        condition: service_healthy
      keycloak:
        condition: service_healthy
      eureka-server:
        condition: service_healthy
      greet-service:
        condition: service_healthy
      hello-service:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8888/actuator/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
